<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAYO TV</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@300;400;500&display=swap');

  :root {
    --gold: #FFD700;
    --gold-dark: #B8960C;
    --gold-dim: rgba(255,215,0,0.15);
    --bg: #0a0a0a;
    --bg2: #111111;
    --bg3: #1a1a1a;
    --text: #f0f0f0;
    --text-dim: #888;
    --red: #e63946;
    --live-color: #00e676;
    --vod-color: #FF6B35;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* LOGIN */
  #login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: radial-gradient(ellipse at center, #1a1200 0%, #0a0a0a 70%);
  }

  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 40px;
  }

  .bolt {
    font-size: 52px;
    filter: drop-shadow(0 0 20px var(--gold));
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { filter: drop-shadow(0 0 20px var(--gold)); }
    50% { filter: drop-shadow(0 0 40px var(--gold)) drop-shadow(0 0 60px #ffaa00); }
  }

  .logo-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: 52px;
    font-weight: 700;
    letter-spacing: 6px;
    background: linear-gradient(135deg, #FFD700, #FFA500, #FFD700);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .login-box {
    background: var(--bg2);
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 16px;
    padding: 36px 32px;
    width: 320px;
    box-shadow: 0 0 60px rgba(255,215,0,0.05);
  }

  .login-box h2 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    letter-spacing: 3px;
    color: var(--gold);
    text-align: center;
    margin-bottom: 28px;
    text-transform: uppercase;
  }

  .field {
    margin-bottom: 16px;
  }

  .field label {
    display: block;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .field input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid rgba(255,215,0,0.15);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus {
    border-color: var(--gold);
  }

  .btn-login {
    width: 100%;
    background: linear-gradient(135deg, var(--gold), #FFA500);
    border: none;
    border-radius: 8px;
    padding: 14px;
    color: #000;
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 3px;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s, transform 0.1s;
  }

  .btn-login:active { transform: scale(0.98); opacity: 0.9; }

  .login-error {
    color: var(--red);
    font-size: 12px;
    text-align: center;
    margin-top: 12px;
    display: none;
  }

  /* APP */
  #app { display: none; }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: var(--bg2);
    border-bottom: 1px solid rgba(255,215,0,0.1);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 4px;
    background: linear-gradient(135deg, #FFD700, #FFA500);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-bolt { font-size: 22px; filter: drop-shadow(0 0 8px var(--gold)); }

  .btn-logout {
    background: none;
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 6px;
    color: var(--gold);
    font-size: 12px;
    letter-spacing: 1px;
    padding: 6px 14px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-logout:hover { background: var(--gold-dim); }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--bg2);
    border-bottom: 1px solid rgba(255,215,0,0.1);
    padding: 0 16px;
    gap: 4px;
  }

  .tab {
    padding: 12px 20px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .tab.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  /* SEARCH */
  .search-bar {
    padding: 14px 16px;
    background: var(--bg2);
    border-bottom: 1px solid rgba(255,215,0,0.08);
  }

  .search-bar input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid rgba(255,215,0,0.15);
    border-radius: 24px;
    padding: 10px 18px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-bar input:focus { border-color: var(--gold); }
  .search-bar input::placeholder { color: var(--text-dim); }

  /* CATEGORIES */
  .categories {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    overflow-x: auto;
    scrollbar-width: none;
    background: var(--bg);
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .categories::-webkit-scrollbar { display: none; }

  .cat-btn {
    flex-shrink: 0;
    background: var(--bg3);
    border: 1px solid rgba(255,215,0,0.15);
    border-radius: 20px;
    padding: 7px 16px;
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .cat-btn.active, .cat-btn:hover {
    background: var(--gold-dim);
    border-color: var(--gold);
    color: var(--gold);
  }

  /* LOADING */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    gap: 16px;
    color: var(--text-dim);
  }

  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid rgba(255,215,0,0.1);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* CHANNEL GRID */
  .channel-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
    padding: 16px;
  }

  @media (max-width: 400px) {
    .channel-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 12px; }
  }

  .channel-card {
    background: var(--bg2);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .channel-card:hover, .channel-card:active {
    border-color: rgba(255,215,0,0.4);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  .channel-img {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: contain;
    background: var(--bg3);
    padding: 12px;
  }

  .channel-img-fallback {
    width: 100%;
    aspect-ratio: 16/9;
    background: var(--bg3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }

  .channel-info {
    padding: 10px 12px;
  }

  .channel-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .channel-type-badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 2px 7px;
    border-radius: 10px;
    margin-top: 6px;
    text-transform: uppercase;
  }

  .badge-live {
    background: rgba(0,230,118,0.15);
    color: var(--live-color);
    border: 1px solid rgba(0,230,118,0.3);
  }

  .badge-vod {
    background: rgba(255,107,53,0.15);
    color: var(--vod-color);
    border: 1px solid rgba(255,107,53,0.3);
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg2);
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 20px 20px 0 0;
    padding: 28px 24px 40px;
    width: 100%;
    max-width: 500px;
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle {
    width: 40px;
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    margin: 0 auto 24px;
  }

  .modal-logo {
    width: 80px;
    height: 80px;
    object-fit: contain;
    background: var(--bg3);
    border-radius: 12px;
    padding: 8px;
    margin: 0 auto 16px;
    display: block;
  }

  .modal-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 20px;
    font-weight: 700;
    text-align: center;
    color: var(--text);
    margin-bottom: 6px;
  }

  .modal-cat {
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
    margin-bottom: 24px;
  }

  .btn-vlc {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    background: linear-gradient(135deg, #FF6B00, #FF9500);
    border: none;
    border-radius: 12px;
    padding: 16px;
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    margin-bottom: 12px;
    transition: opacity 0.2s;
    text-decoration: none;
  }

  .btn-vlc:active { opacity: 0.85; }

  .btn-copy {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    background: var(--bg3);
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 12px;
    padding: 14px;
    color: var(--gold);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    margin-bottom: 12px;
    transition: background 0.2s;
  }

  .btn-copy:hover { background: var(--gold-dim); }

  .btn-close-modal {
    width: 100%;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 14px;
    cursor: pointer;
    padding: 10px;
  }

  .copy-toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--gold);
    color: #000;
    padding: 10px 24px;
    border-radius: 24px;
    font-weight: 600;
    font-size: 13px;
    z-index: 300;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }

  .copy-toast.show { opacity: 1; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-size: 14px;
  }

  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

  .section-count {
    padding: 8px 16px 0;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="logo-wrap">
    <span class="bolt">⚡</span>
    <span class="logo-text">RAYO TV</span>
  </div>
  <div class="login-box">
    <h2>Acceso</h2>
    <div class="field">
      <label>Usuario</label>
      <input type="text" id="username" placeholder="Usuario" autocomplete="off">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="Contraseña">
    </div>
    <button class="btn-login" onclick="doLogin()">ENTRAR</button>
    <div class="login-error" id="login-error">Usuario o contraseña incorrectos</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="header-logo">
      <span class="header-bolt">⚡</span> RAYO TV
    </div>
    <button class="btn-logout" onclick="doLogout()">SALIR</button>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('all')">TODO</div>
    <div class="tab" onclick="switchTab('live')">📡 EN VIVO</div>
    <div class="tab" onclick="switchTab('vod')">🎬 VOD</div>
  </div>

  <div class="search-bar">
    <input type="search" id="search-input" placeholder="🔍  Buscar canal o película..." oninput="filterChannels()">
  </div>

  <div class="categories" id="categories-bar"></div>

  <div class="section-count" id="section-count"></div>

  <div id="content-area">
    <div class="loading">
      <div class="spinner"></div>
      <span>Cargando canales...</span>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <img id="modal-logo" class="modal-logo" src="" alt="" onerror="this.style.display='none'">
    <div class="modal-name" id="modal-name"></div>
    <div class="modal-cat" id="modal-cat"></div>
    <a class="btn-vlc" id="btn-vlc" href="#">
      ▶ ABRIR EN VLC
    </a>
    <button class="btn-copy" onclick="copyUrl()">
      📋 COPIAR ENLACE
    </button>
    <button class="btn-close-modal" onclick="closeModal()">Cerrar</button>
  </div>
</div>

<div class="copy-toast" id="copy-toast">¡Enlace copiado!</div>

<script>
// =================== CONFIG ===================
const REPO = 'RAYMC10/RAYOTV';
const BASE_URL = `https://raw.githubusercontent.com/${REPO}/main/`;
const API_URL = `https://api.github.com/repos/${REPO}/contents/`;

// =================== LOGIN ===================
function doLogin() {
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value.trim();
  if (u === 'RAYO' && p === 'RAYO10*10') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadAllChannels();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function doLogout() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('username').value = '';
  document.getElementById('password').value = '';
  allChannels = [];
  filteredChannels = [];
}

// =================== DATA ===================
let allChannels = [];
let filteredChannels = [];
let currentTab = 'all';
let currentCategory = 'TODOS';
let currentChannel = null;

async function loadAllChannels() {
  try {
    const res = await fetch(API_URL);
    const files = await res.json();
    const jsonFiles = files.filter(f => f.name.endsWith('.json'));

    document.getElementById('content-area').innerHTML = `
      <div class="loading">
        <div class="spinner"></div>
        <span>Cargando ${jsonFiles.length} categorías...</span>
      </div>`;

    const promises = jsonFiles.map(f =>
      fetch(BASE_URL + encodeURIComponent(f.name))
        .then(r => r.json())
        .catch(() => [])
    );

    const results = await Promise.all(promises);
    allChannels = results.flat().filter(c => c && c.url);

    buildCategories();
    renderChannels();
  } catch (err) {
    document.getElementById('content-area').innerHTML = `
      <div class="empty-state">
        <div class="icon">⚠️</div>
        <div>Error cargando canales.<br>Verifica tu conexión.</div>
      </div>`;
  }
}

// =================== TABS ===================
function switchTab(tab) {
  currentTab = tab;
  currentCategory = 'TODOS';
  document.getElementById('search-input').value = '';
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['all','live','vod'][i] === tab);
  });
  buildCategories();
  filterChannels();
}

// =================== CATEGORIES ===================
function buildCategories() {
  const base = getBaseChannels();
  const cats = ['TODOS', ...new Set(base.map(c => cleanCat(c.category)))].slice(0, 40);
  const bar = document.getElementById('categories-bar');
  bar.innerHTML = cats.map(c => `
    <button class="cat-btn ${c === currentCategory ? 'active' : ''}" onclick="selectCat('${escHtml(c)}')">${c}</button>
  `).join('');
}

function selectCat(cat) {
  currentCategory = cat;
  document.getElementById('search-input').value = '';
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === cat);
  });
  filterChannels();
}

function cleanCat(cat) {
  if (!cat) return 'GENERAL';
  return cat.replace(/✅\s*\|\s*/g, '').replace(/\s*✅/g, '').trim().toUpperCase();
}

function getBaseChannels() {
  if (currentTab === 'live') return allChannels.filter(c => c.type === 'live');
  if (currentTab === 'vod') return allChannels.filter(c => c.type !== 'live');
  return allChannels;
}

// =================== FILTER & RENDER ===================
function filterChannels() {
  const q = document.getElementById('search-input').value.toLowerCase();
  let base = getBaseChannels();

  if (currentCategory !== 'TODOS') {
    base = base.filter(c => cleanCat(c.category) === currentCategory);
  }

  if (q) {
    base = base.filter(c => c.name.toLowerCase().includes(q));
  }

  filteredChannels = base;
  renderChannels();
}

function renderChannels() {
  const count = filteredChannels.length;
  document.getElementById('section-count').textContent =
    count > 0 ? `${count.toLocaleString()} resultados` : '';

  if (count === 0) {
    document.getElementById('content-area').innerHTML = `
      <div class="empty-state">
        <div class="icon">📺</div>
        <div>No se encontraron resultados</div>
      </div>`;
    return;
  }

  const html = filteredChannels.map((ch, i) => {
    const isLive = ch.type === 'live';
    const badge = isLive
      ? `<span class="channel-type-badge badge-live">● EN VIVO</span>`
      : `<span class="channel-type-badge badge-vod">▶ VOD</span>`;
    const imgHtml = ch.logo
      ? `<img class="channel-img" src="${escHtml(ch.logo)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=channel-img-fallback>📺</div>'">`
      : `<div class="channel-img-fallback">📺</div>`;

    return `
      <div class="channel-card" onclick="openModal(${i})">
        ${imgHtml}
        <div class="channel-info">
          <div class="channel-name">${escHtml(ch.name)}</div>
          ${badge}
        </div>
      </div>`;
  }).join('');

  document.getElementById('content-area').innerHTML = `<div class="channel-grid">${html}</div>`;
}

// =================== MODAL ===================
function openModal(index) {
  currentChannel = filteredChannels[index];
  const ch = currentChannel;

  document.getElementById('modal-logo').src = ch.logo || '';
  document.getElementById('modal-logo').style.display = ch.logo ? 'block' : 'none';
  document.getElementById('modal-name').textContent = ch.name;
  document.getElementById('modal-cat').textContent = cleanCat(ch.category);

  // Intent URL para abrir directo en VLC en Android
  const streamUrl = ch.url;
  const vlcIntent = `intent://${streamUrl.replace(/^https?:\/\//, '')}#Intent;package=org.videolan.vlc;scheme=${streamUrl.startsWith('https') ? 'https' : 'http'};end`;
  document.getElementById('btn-vlc').href = vlcIntent;

  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('open');
  }
}

function copyUrl() {
  if (!currentChannel) return;
  navigator.clipboard.writeText(currentChannel.url).then(() => {
    const toast = document.getElementById('copy-toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }).catch(() => {
    // Fallback para cuando clipboard API no está disponible
    const el = document.createElement('textarea');
    el.value = currentChannel.url;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    const toast = document.getElementById('copy-toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  });
}

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
</body>
</html>
